name: Deploy study site to GitHub Pages

# 教材ソース（lectures/*/README.md, docs/）から tools/build_site.py で静的サイトを
# CI 上でビルドし、その成果物を GitHub Pages へ配信する。
# 生成物 site/ はリポジトリにコミットしない（ソースのみ追跡し、毎回ここで作る）。
on:
  push:
    branches: [main]
    paths:
      - "lectures/**/README.md"
      - "lectures/**/practice/demo.py"
      - "docs/**"
      - "tools/build_site.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに絞る（連続pushでも最新だけ配信）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build static site (markdown -> HTML)
        run: uv run --group site python tools/build_site.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
